StylesPath = .vale-styles
MinAlertLevel = warning
Packages = Microsoft

[*.md]
BasedOnStyles = Microsoft

# Keep
Microsoft.Passive = YES
Microsoft.Wordiness = YES
Microsoft.SentenceLength = YES
Microsoft.Semicolon = YES

# Suppress — style choices appropriate for technical/networking docs
Microsoft.Headings = NO
Microsoft.HeadingPunctuation = NO
Microsoft.Contractions = NO
Microsoft.OxfordComma = NO
Microsoft.Adverbs = NO
Microsoft.Acronyms = NO
Microsoft.HeadingAcronyms = NO
Microsoft.Ellipses = NO
Microsoft.Dashes = NO
Microsoft.We = NO
Microsoft.Ranges = NO
